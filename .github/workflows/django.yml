name: Django CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      max-parallel: 4
      matrix:
        python-version: [3.14]

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: clinica
          POSTGRES_USER: django_user
          POSTGRES_PASSWORD: jennifer123
        ports:
          - 5432:5432

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.14

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        cd clinica
        pip install -r requirements.txt
        pip install psycopg2-binary

    - name: Run migrations
      env:
        DB_NAME: clinica
        DB_USER: django_user
        DB_PASSWORD: jennifer123
        DB_HOST: localhost
        DB_PORT: 5432
      run: |
        cd clinica
        python manage.py migrate

    - name: Run tests
      env:
        DB_NAME: clinica
        DB_USER: django_user
        DB_PASSWORD: jennifer123
        DB_HOST: localhost
        DB_PORT: 5432
      run: |
        cd clinica
        python manage.py test
